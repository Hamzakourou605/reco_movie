name: Backend CI/CD Pipeline

on:
  push:
    branches: [ "main", "develop" ]
    paths:
      - "**.py"
      - "requirements.txt"
      - ".github/workflows/backend-ci.yml"
  pull_request:
    branches: [ "main", "develop" ]
    paths:
      - "**.py"
      - "requirements.txt"

jobs:
  # 1️⃣  TEST ET LINT DU CODE PYTHON
  test:
    name: Tests Python & Lint
    runs-on: ubuntu-latest
    
    strategy:
      matrix:
        python-version: ["3.9", "3.10", "3.11"]
    
    steps:
      - name: ✅ Checkout code
        uses: actions/checkout@v4
      
      - name: 🐍 Setup Python ${{ matrix.python-version }}
        uses: actions/setup-python@v4
        with:
          python-version: ${{ matrix.python-version }}
          cache: 'pip'
      
      - name: 📦 Installer les dépendances
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-cov flake8 black isort
      
      - name: 🎨 Lint avec Flake8
        run: |
          # Vérifie le style du code
          flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics
          flake8 . --count --exit-zero --max-complexity=10 --max-line-length=127 --statistics
      
      - name: 🔍 Format check avec Black
        run: |
          black --check . || true
      
      - name: 🔄 Ordre des imports avec isort
        run: |
          isort --check-only . || true
      
      - name: 🧪 Lancer les tests
        run: |
          pytest test_ml_recommendations.py -v --cov=. --cov-report=xml --cov-report=html
      
      - name: 📊 Upload coverage reports
        uses: codecov/codecov-action@v3
        with:
          file: ./coverage.xml
          flags: unittests
          name: codecov-umbrella

  # 2️⃣  BUILD ET VÉRIFICATION
  build:
    name: Build Backend
    runs-on: ubuntu-latest
    needs: test
    
    steps:
      - name: ✅ Checkout code
        uses: actions/checkout@v4
      
      - name: 🐍 Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.11"
          cache: 'pip'
      
      - name: 📦 Installer les dépendances
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      
      - name: 🔨 Compiler le modèle ML
        run: |
          python -c "from ml_model import MovieRecommender; print('✅ Module ML importé avec succès')"
      
      - name: 📝 Vérifier la strukture
        run: |
          python -c "
          import os
          required_files = ['app.py', 'ml_model.py', 'database.py']
          for f in required_files:
              if not os.path.exists(f):
                  raise FileNotFoundError(f'Fichier manquant: {f}')
          print('✅ Tous les fichiers requis sont présents')
          "

  # 3️⃣  SCAN DE SÉCURITÉ
  security:
    name: Sécurité & Dépendances
    runs-on: ubuntu-latest
    
    steps:
      - name: ✅ Checkout code
        uses: actions/checkout@v4
      
      - name: 🔐 Bandit Security Scan
        run: |
          pip install bandit
          bandit -r . -f json -o bandit-report.json || true
      
      - name: 📦 Check dépendances avec Safety
        run: |
          pip install safety
          safety check --json || true

  # 4️⃣  DÉPLOIEMENT AUTOMATIQUE SUR RENDER
  deploy:
    name: Deploy to Render
    runs-on: ubuntu-latest
    needs: [test, build, security]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    
    steps:
      - name: ✅ Checkout code
        uses: actions/checkout@v4
      
      - name: 🚀 Trigger Render deployment
        run: |
          curl --request POST \
            --url "https://api.render.com/deploy/srv-${{ secrets.RENDER_SERVICE_ID }}?key=${{ secrets.RENDER_DEPLOY_KEY }}" \
            --header 'Accept: application/json' \
            --header 'Content-Type: application/json' \
            --data '{"imageUrl":null}'
          echo "✅ Déploiement Render déclenché"
      
      - name: 📧 Notifier le déploiement
        run: |
          echo "🚀 Backend déployé sur Render"
          echo "✅ URL: https://reco-movies-backend.onrender.com"
          echo "📊 Vérifie les logs sur Render Dashboard"
