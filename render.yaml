services:
  # ---------------------------------------------------------------------------
  # 1. DATABASE (PostgreSQL)
  # ---------------------------------------------------------------------------
  - type: database
    name: reco-movies-db
    databaseName: reco_movies
    user: postgres
    plan: free

  # ---------------------------------------------------------------------------
  # 2. BACKEND (Flask API)
  # ---------------------------------------------------------------------------
  - type: web
    name: reco-movies-api
    env: python
    plan: free
    buildCommand: "pip install -r requirements.txt"
    startCommand: "gunicorn app:app"
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: reco-movies-db
          property: connectionString
      - key: FLASK_ENV
        value: production
      - key: PYTHON_VERSION
        value: 3.11
      - key: TMDB_API_KEY
        sync: false # À configurer manuellement dans le dashboard Render

  # ---------------------------------------------------------------------------
  # 3. FRONTEND (React Static Site)
  # ---------------------------------------------------------------------------
  - type: static_site
    name: reco-movies-web
    plan: free
    buildCommand: "cd frontend && npm install && npm run build"
    publishPath: frontend/dist
    envVars:
      - key: VITE_API_URL
        fromService:
          type: web
          name: reco-movies-api
          property: host
        # Note: Render prefixera avec https:// et il faudra peut-être ajouter /api manuellement
        # mais la plupart des configs utilisent le host direct.
